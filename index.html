<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МТК №24 · Ленин в октябре — 24–25 октября 1917</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage" id="stage" aria-label="МТК №24 — видео-проекция «24–25 октября 1917»">

    <!-- РАБОЧИЙ ЭКРАН (размер по ТЗ ≈ 2925×2497). Всё событийное — здесь. -->
    <div class="work" id="work">
      <canvas id="gl"></canvas>

      <!-- полноэкранная вспышка спецэффектов (вести, выстрел) — драйвится scene.js -->
      <div class="fx-flash" id="fx-flash" aria-hidden="true"></div>

      <header class="brand" aria-hidden="true">
        <div class="kicker">МТК №24 · музей В.И. Ленина</div>
        <h1>Ленин<br>в октябре</h1>
      </header>

      <!-- большие часы + календарь: точное ВРЕМЯ СОБЫТИЯ -->
      <div class="clockbox" id="clockbox" aria-hidden="true">
        <div class="ev-date" id="ev-date">24 октября 1917</div>
        <div class="ev-time" id="ev-time">--:--</div>
      </div>

      <div class="forces" aria-hidden="true">
        <div class="force-row"><span class="chip chip-vrk">★</span><span>Военно-революционный комитет</span></div>
        <div class="force-row"><span class="chip chip-pg"></span><span>Временное правительство</span></div>
      </div>

      <figure class="ill" id="ill" aria-hidden="true">
        <img id="ill-img" alt="">
        <figcaption id="ill-cap"></figcaption>
      </figure>

      <section class="narration" id="narration" aria-hidden="true">
        <span class="date" id="n-date"></span>
        <h2 id="n-title"></h2>
        <p class="lede" id="n-lede"></p>
      </section>

      <aside class="quote" id="quote" aria-hidden="true">
        <div class="mark">«</div>
        <p id="q-text"></p>
        <div class="cite" id="q-cite"></div>
      </aside>
    </div><!-- /work -->

    <!-- ГЗК: полный дикторский текст — ПРАВАЯ панель, вне рабочего экрана (технический вывод) -->
    <aside class="tech" id="tech">
      <div class="tech-head">
        <div class="tech-scene" id="tech-scene">—</div>
        <div class="tech-title" id="tech-title"></div>
        <dl class="tech-meta" id="tech-meta"></dl>
      </div>

      <!-- ОКНО СТАТУСА ЗАГРУЗКИ МОДЕЛЕЙ (✓ загружено / % / ✗ ошибка) -->
      <div class="tech-load" id="tech-load">
        <span class="tech-label" id="ls-label">статус моделей</span>
        <div class="ls-list" id="ls-list"></div>
      </div>

      <!-- 3D-ВЬЮЕР ОБЪЕКТА: по клику на здание на карте оно крутится здесь под светом.
           Сам вьюер — _qa.html (зона сессии моделей), принимает ?key=<ключ из data/models.js>. -->
      <section class="tech-viewer" id="tech-viewer">
        <span class="tech-label">3D-модель · клик по зданию на карте</span>
        <div class="tv-stage">
          <iframe id="model-view" title="3D-модель объекта"
            src="./assets/models/_qa.html?key=fortress&bg=0x12181e"></iframe>
          <div class="tv-cap" id="tv-cap">Петропавловская крепость</div>
        </div>
      </section>

      <div class="tech-vo" id="tech-vo">
        <span class="tech-label">ГЗК · полный дикторский текст</span>
        <p id="vo-full"></p>
      </div>

      <!-- ПАНЕЛЬ ОСВЕЩЕНИЯ — тумблеры и настройки эффекта день/ночь и теней -->
      <div class="tech-ctrls" id="tech-ctrls">
        <span class="tech-label">Освещение сцены</span>
        <label class="ctrl-switch"><input type="checkbox" id="cx-light"><span>Свет по времени суток</span></label>
        <div class="ctrl-row"><label for="cx-sunh">Высота Солнца</label>
          <b class="ctrl-val" id="cx-sunh-v">28°</b><input type="range" id="cx-sunh" min="8" max="70" step="1"></div>
        <div class="ctrl-row"><label for="cx-contrast">Контраст день/ночь</label>
          <b class="ctrl-val" id="cx-contrast-v">100%</b><input type="range" id="cx-contrast" min="0" max="100" step="1"></div>
        <label class="ctrl-switch"><input type="checkbox" id="cx-shadow" checked><span>Тени от зданий</span></label>
        <div class="ctrl-row"><label for="cx-shadowp">Сила теней</label>
          <b class="ctrl-val" id="cx-shadowp-v">45%</b><input type="range" id="cx-shadowp" min="0" max="100" step="1"></div>
        <label class="ctrl-switch"><input type="checkbox" id="cx-pads"><span>Круги под моделями</span></label>
        <label class="ctrl-switch"><input type="checkbox" id="cx-freecam"><span>Свободная камера (зум/поворот)</span></label>
        <label class="ctrl-switch"><input type="checkbox" id="cx-edit"><span>Правка объектов (двигать; мост — форма)</span></label>
        <div class="bt-readout" id="bt-readout"></div>
      </div>
    </aside>

    <!-- таймлайн событий — нижняя полоса под рабочим экраном -->
    <footer class="transport" id="transport">
      <button class="btn-play" id="btnPlay" aria-label="пауза / воспроизведение">❚❚</button>
      <div class="track" id="track">
        <div class="track-line"></div>
        <div class="track-fill" id="trackFill"></div>
      </div>
      <div class="clock" id="clock"><b>24 окт · --:--</b></div>
    </footer>
  </main>

  <script src="./data/locations.js"></script>
  <script src="./data/streets.js"></script>
  <script src="./data/scenario.js"></script>
  <script src="./data/models.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three/three.module.min.js",
      "three/addons/": "./lib/three/addons/"
    }
  }
  </script>
  <script type="module" src="./scene.js"></script>
  <script src="./shape-clip.js"></script>
</body>
</html>
