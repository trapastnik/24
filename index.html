<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МТК №24 · Ленин в октябре — 24–25 октября 1917</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage" id="stage" aria-label="МТК №24 — видео-проекция «24–25 октября 1917»">

    <!-- РАБОЧИЙ ЭКРАН (размер по ТЗ ≈ 2925×2497). Всё событийное — здесь. -->
    <div class="work" id="work">
      <canvas id="gl"></canvas>

      <!-- полноэкранная вспышка спецэффектов (вести, выстрел) — драйвится scene.js -->
      <div class="fx-flash" id="fx-flash" aria-hidden="true"></div>

      <header class="brand" aria-hidden="true">
        <div class="kicker">МТК №24 · музей В.И. Ленина</div>
        <h1>Ленин<br>в октябре</h1>
      </header>

      <!-- большие часы + календарь: точное ВРЕМЯ СОБЫТИЯ -->
      <div class="clockbox" id="clockbox" aria-hidden="true">
        <div class="ev-date" id="ev-date">24 октября 1917</div>
        <div class="ev-time" id="ev-time">--:--</div>
      </div>

      <div class="forces" aria-hidden="true">
        <div class="force-row"><span class="chip chip-vrk">★</span><span>Военно-революционный комитет</span></div>
        <div class="force-row"><span class="chip chip-pg"></span><span>Временное правительство</span></div>
      </div>

      <figure class="ill" id="ill" aria-hidden="true">
        <img id="ill-img" alt="">
        <figcaption id="ill-cap"></figcaption>
      </figure>

      <section class="narration" id="narration" aria-hidden="true">
        <span class="date" id="n-date"></span>
        <h2 id="n-title"></h2>
        <p class="lede" id="n-lede"></p>
      </section>

      <aside class="quote" id="quote" aria-hidden="true">
        <div class="mark">«</div>
        <p id="q-text"></p>
        <div class="cite" id="q-cite"></div>
      </aside>
    </div><!-- /work -->

    <!-- ГЗК: полный дикторский текст — ПРАВАЯ панель, вне рабочего экрана (технический вывод) -->
    <aside class="tech" id="tech">
      <div class="tech-head">
        <div class="tech-scene" id="tech-scene">—</div>
        <div class="tech-title" id="tech-title"></div>
        <dl class="tech-meta" id="tech-meta"></dl>
      </div>
      <div class="tech-vo" id="tech-vo">
        <span class="tech-label">ГЗК · полный дикторский текст</span>
        <p id="vo-full"></p>
      </div>
    </aside>

    <!-- таймлайн событий — нижняя полоса под рабочим экраном -->
    <footer class="transport" id="transport">
      <button class="btn-play" id="btnPlay" aria-label="пауза / воспроизведение">❚❚</button>
      <div class="track" id="track">
        <div class="track-line"></div>
        <div class="track-fill" id="trackFill"></div>
      </div>
      <div class="clock" id="clock"><b>24 окт · --:--</b></div>
    </footer>
  </main>

  <script src="./data/locations.js"></script>
  <script src="./data/streets.js"></script>
  <script src="./data/scenario.js"></script>
  <script src="./data/models.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three/three.module.min.js",
      "three/addons/": "./lib/three/addons/"
    }
  }
  </script>
  <script type="module" src="./scene.js"></script>
  <script src="./shape-clip.js"></script>
</body>
</html>
